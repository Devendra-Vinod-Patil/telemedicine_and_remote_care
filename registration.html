<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - TeleMedCare</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Google Fonts - Lato -->
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  
  <style>
    :root {
        --terracotta: #e2725b;
        --light-beige: #f5f2eb;
        --muted-teal: #2f3e46;
        --light-teal: #3a4d57;
    }
    
    body {
        font-family: 'Lato', sans-serif;
        background-color: var(--light-beige);
        color: #333;
        min-height: 100vh;
        display: flex;
        align-items: center;
        overflow-x: hidden;
    }
    
    .register-container {
        position: relative;
        z-index: 2;
    }
    
    .register-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        position: relative;
    }
    
    .grid-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: 
            linear-gradient(rgba(245, 242, 235, 0.9), rgba(245, 242, 235, 0.9)),
            linear-gradient(#e2725b 1px, transparent 1px),
            linear-gradient(90deg, #e2725b 1px, transparent 1px);
        background-size: 100% 100%, 40px 40px, 40px 40px;
        opacity: 0.1;
        z-index: 1;
    }
    
    .doctor-icon {
        position: absolute;
        font-size: 2rem;
        color: var(--terracotta);
        opacity: 0.3;
        z-index: 1;
        animation: float 6s ease-in-out infinite;
    }
    
    @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(5deg); }
    }
    
    .btn-primary {
        background-color: var(--muted-teal);
        border-color: var(--muted-teal);
        border-radius: 50px;
        font-weight: 600;
        padding: 12px 30px;
        transition: all 0.3s;
    }
    
    .btn-primary:hover {
        background-color: var(--terracotta);
        border-color: var(--terracotta);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    .form-control {
        border-radius: 10px;
        padding: 12px 15px;
        border: 1px solid #ddd;
        transition: all 0.3s;
    }
    
    .form-control:focus {
        border-color: var(--terracotta);
        box-shadow: 0 0 0 0.2rem rgba(226, 114, 91, 0.25);
    }
    
    .register-header {
        background: linear-gradient(135deg, var(--muted-teal) 0%, var(--light-teal) 100%);
        color: white;
        padding: 30px;
        text-align: center;
    }
    
    .register-body {
        padding: 30px;
    }
    
    .doctor-fields {
        background-color: rgba(226, 114, 91, 0.05);
        border-radius: 10px;
        padding: 20px;
        border-left: 4px solid var(--terracotta);
        transition: all 0.3s;
    }
    
    .doctor-fields.animate__animated {
        animation-duration: 0.5s;
    }
    
    /* Responsive adjustments */
    @media (max-width: 768px) {
        .register-card {
            margin: 20px;
        }
        
        .register-header h1 {
            font-size: 1.8rem;
        }
    }
  </style>
</head>
<body>
    <!-- Animated Grid Background -->
    <div class="grid-bg"></div>
    
    <!-- Floating Doctor Icons -->
    <i class="doctor-icon fas fa-user-md" style="top: 10%; left: 5%; animation-delay: 0s;"></i>
    <i class="doctor-icon fas fa-stethoscope" style="top: 20%; right: 7%; animation-delay: 1s;"></i>
    <i class="doctor-icon fas fa-heartbeat" style="bottom: 15%; left: 8%; animation-delay: 2s;"></i>
    <i class="doctor-icon fas fa-ambulance" style="bottom: 25%; right: 10%; animation-delay: 3s;"></i>
    <i class="doctor-icon fas fa-prescription" style="top: 50%; left: 15%; animation-delay: 4s;"></i>
    <i class="doctor-icon fas fa-clipboard" style="top: 60%; right: 12%; animation-delay: 5s;"></i>

    <div class="container register-container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="register-card animate__animated animate__fadeInUp">
                    <div class="register-header">
                        <div class="mb-3">
                            <i class="fas fa-heartbeat fa-3x"></i>
                        </div>
                        <h1 class="h3 fw-bold">Create Account</h1>
                        <p class="mb-0">Join TeleMedCare today</p>
                    </div>
                    
                    <div class="register-body">
                        <form id="registerForm" action="registration.php" method="POST" enctype="multipart/form-data" class="needs-validation" novalidate>
                            <!-- Role Selection -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Register as</label>
                                <select name="role" id="role" class="form-select" required>
                                    <option value="">-- Select Role --</option>
                                    <option value="patient">Patient</option>
                                    <option value="doctor">Doctor</option>
                                </select>
                                <div class="invalid-feedback">
                                    Please select your role.
                                </div>
                            </div>

                            <!-- Common Fields -->
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label fw-semibold">Full Name</label>
                                    <input type="text" name="fullName" class="form-control" required>
                                    <div class="invalid-feedback">
                                        Please provide your full name.
                                    </div>
                                </div>
                                
                                <div class="col-md-6 mb-4">
                                    <label class="form-label fw-semibold">Email</label>
                                    <input type="email" name="email" class="form-control" required>
                                    <div class="invalid-feedback">
                                        Please provide a valid email.
                                    </div>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label fw-semibold">Phone</label>
                                    <input type="tel" name="phone" class="form-control">
                                </div>
                                
                                <div class="col-md-6 mb-4">
                                    <label class="form-label fw-semibold">Password</label>
                                    <input type="password" name="password" class="form-control" required>
                                    <div class="invalid-feedback">
                                        Please provide a password.
                                    </div>
                                </div>
                            </div>

                            <!-- Doctor-specific Fields -->
                            <div id="doctorFields" class="doctor-fields mb-4" style="display: none;">
                                <h5 class="fw-bold mb-3" style="color: var(--terracotta);">
                                    <i class="fas fa-user-md me-2"></i>Doctor Information
                                </h5>
                                
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-semibold">Specialization</label>
                                        <input type="text" name="specialization" class="form-control">
                                    </div>
                                    
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-semibold">Experience (Years)</label>
                                        <input type="number" name="experience" class="form-control" min="0">
                                    </div>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Clinic / Hospital</label>
                                    <input type="text" name="clinic" class="form-control">
                                </div>
                                
                                <div class="mb-0">
                                    <label class="form-label fw-semibold">Profile Photo</label>
                                    <input type="file" name="photo" accept="image/*" class="form-control">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2">
                                Create Account
                            </button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <p class="mb-0">Already have an account?
                                <a href="login.php" class="fw-semibold" style="color: var(--muted-teal);">Sign in here</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Toggle doctor fields based on role selection
        document.getElementById("role").addEventListener("change", function() {
            const doctorFields = document.getElementById("doctorFields");
            const isDoctor = this.value === "doctor";
            
            if (isDoctor) {
                doctorFields.style.display = 'block';
                doctorFields.classList.add('animate__fadeIn');
            } else {
                doctorFields.classList.add('animate__fadeOut');
                setTimeout(() => {
                    doctorFields.style.display = 'none';
                    doctorFields.classList.remove('animate__fadeOut');
                }, 500);
            }
        });
        
        // Form validation
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms)
                .forEach(function (form) {
                    form.addEventListener('submit', function (event) {
                        if (!form.checkValidity()) {
                            event.preventDefault()
                            event.stopPropagation()
                        }
                        form.classList.add('was-validated')
                    }, false)
                })
        })()
        
        // Add animation to form elements on focus
        document.querySelectorAll('.form-control, .form-select').forEach(element => {
            element.addEventListener('focus', function() {
                this.parentElement.classList.add('animate__pulse');
            });
            
            element.addEventListener('blur', function() {
                this.parentElement.classList.remove('animate__pulse');
            });
        });
    </script>
</body>
</html>
