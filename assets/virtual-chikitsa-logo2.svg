<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="240" viewBox="0 0 640 240">
  <defs>
    <style>
      .bg { fill: #1f4fbf; }
      .white { fill: #ffffff; }
      .orange { fill: #ff7a18; font: 700 54px/1.05 "Manrope", "Segoe UI", Arial, sans-serif; }
      .green { fill: #3ddc97; font: 600 24px/1.2 "Manrope", "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="640" height="240" rx="0"/>

  <!-- Simple medical emblem (wings + staff) -->
  <g transform="translate(52 40)" class="white">
    <!-- Wings -->
    <path d="M68 30c-22 0-44 10-56 26 18-10 33-12 54-6-18 0-33 4-49 16 22-4 38-3 58 7-18 1-29 6-40 16 22-6 34-6 54 3 19-9 32-9 54-3-11-10-22-15-40-16 20-10 36-11 58-7-16-12-31-16-49-16 21-6 36-4 54 6C112 40 90 30 68 30z" opacity="0.95"/>
    <!-- Staff -->
    <rect x="64" y="42" width="8" height="128" rx="4"/>
    <circle cx="68" cy="34" r="10"/>
    <!-- Snake (stylized) -->
    <path d="M48 78c20-10 40-10 58 0 14 8 14 22 0 30-12 7-24 7-36 0-10-6-10-14 0-20 12-7 24-7 36 0"
          fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <path d="M88 128c-20 10-40 10-58 0-14-8-14-22 0-30 12-7 24-7 36 0 10 6 10 14 0 20-12 7-24 7-36 0"
          fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Brand text -->
  <text x="200" y="118" class="orange">Virtual-Chikitsa</text>
  <text x="200" y="160" class="green">online Medical consultation</text>
</svg>

